app:
  name: "APK Multi-Agent Analyzer"
  version: "1.0.0"
  debug: false

analysis:
  parallel: true
  max_workers: 4
  timeout: 300
  skip_existing: false

output:
  format: ["markdown", "html", "json"]
  base_dir: "output"
  compress: false

logging:
  level: "INFO"
  file: "output/agent.log"
  max_size: "10MB"
  backup_count: 5

api:
  enabled: false
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  model_fallbacks: []
  base_url: "https://api.anthropic.com"
  api_key: ""
  max_tokens: 4096
  temperature: 0.2
  timeout: 60
  cache: true

agents:
  enabled:
    extractor: true
    decompiler: true
    analyzer: true
    scanner: true
    reporter: true
    formatter: true

  extractor:
    decode_resources: true
    decode_sources: false

  decompiler:
    generate_jar: false
    generate_smali: false

  analyzer:
    deep_analysis: true
    check_permissions: true
    check_components: true
    check_network: true
    check_crypto: true
    check_storage: true
    check_sensitive_apis: true

  scanner:
    rules_dir: "rules"
    use_mobsf: false
    use_quark: true
    malware_check: true
    sensitive_data_check: true
